services:
  db:
    image: postgres:16-alpine
    ports:
      - "5850:5432"
    environment:
      POSTGRES_DB: personsdb
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: liquibase/liquibase:4.27
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./back-end/PersonApi/Liquibase/changelog:/liquibase/changelog
    command: >
      --url=jdbc:postgresql://db:5432/personsdb
      --username=postgres
      --changeLogFile=changelog/db.changelog-master.xml
      update

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=personsdb;Username=postgres"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  pgdata-dev:
